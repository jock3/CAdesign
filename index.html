<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projekt Todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F4F1FF;
      color: #2D2A3E;
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 2.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #2D2A3E;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #A89FC8;
    }

    .field input,
    .field select {
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #DDD8F5;
      border-radius: 7px;
      font-size: 0.88rem;
      background: #fff;
      color: #2D2A3E;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: #B8A8F0;
    }

    #inp-status {
      background: #C5B3FF;
      color: #3E2080;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    #inp-status:focus { border: none; }

    .field-name { flex: 1; min-width: 180px; }

    .btn-add {
      padding: 0.55rem 1.2rem;
      background: #C5B3FF;
      color: #3E2080;
      border: none;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-add:hover { background: #B8A3F5; }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      border-bottom: 1.5px solid #E8E3FF;
    }

    th {
      padding: 0.65rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #B0A8C8;
    }

    th.col-color   { width: 10px; padding: 0; }
    th.col-expand  { width: 44px; }
    th.col-actions { width: 44px; }

    tbody tr.project-row {
      border-bottom: 1px solid #EEE9FF;
    }

    td {
      padding: 0.8rem 1rem;
      font-size: 0.88rem;
      vertical-align: middle;
    }

    /* Color bar */
    td.col-color {
      padding: 0;
      cursor: pointer;
      position: relative;
    }

    .color-bar {
      width: 10px;
      min-height: 52px;
      border-radius: 4px 0 0 4px;
    }

    /* Palette popover */
    .palette-popover {
      position: absolute;
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      background: #fff;
      border: 1.5px solid #DDD8F5;
      border-radius: 10px;
      padding: 8px;
      z-index: 200;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      width: 132px;
    }

    .palette-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s;
    }
    .palette-swatch:hover { transform: scale(1.15); }
    .palette-swatch.selected { border-color: #555; }

    /* Expand button */
    .expand-btn {
      background: none;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.8rem;
      color: #C0B8D8;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.1s;
    }
    .expand-btn:hover { background: #EEE8FF; color: #8070B0; }
    .expand-btn.open { transform: rotate(90deg); }

    /* Status select */
    .status-select {
      border: none;
      border-radius: 999px;
      padding: 0.25rem 0.65rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    /* Delete button */
    .delete-btn {
      background: none;
      border: none;
      color: #E8A0A0;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      opacity: 0.5;
    }
    .delete-btn:hover { opacity: 1; background: #FFF0F0; }

    /* Deadline cell */
    .deadline-cell { font-size: 0.84rem; }
    .deadline-cell.overdue { color: #E07070; font-weight: 500; }

    /* Notes row */
    tr.notes-row { display: none; }
    tr.notes-row.open { display: table-row; }

    td.notes-cell {
      padding: 0.75rem 1rem 1.25rem 1.5rem;
      background: #FDFBFF;
      border-left: 5px solid #E0D8FF;
    }

    .note-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #F0ECFF;
    }
    .note-item:last-of-type { border-bottom: none; }

    .note-date {
      font-size: 0.7rem;
      color: #B0A8C8;
      white-space: nowrap;
      padding-top: 3px;
      min-width: 75px;
    }

    .note-text {
      font-size: 0.87rem;
      color: #2D2A3E;
      flex: 1;
      line-height: 1.55;
    }

    .note-delete {
      background: none;
      border: none;
      color: #E8A0A0;
      cursor: pointer;
      font-size: 0.75rem;
      opacity: 0.4;
      padding: 2px 4px;
    }
    .note-delete:hover { opacity: 1; }

    .add-note-btn {
      margin-top: 0.85rem;
      background: none;
      border: 1.5px dashed #C5B8F0;
      color: #9078C8;
      border-radius: 7px;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .add-note-btn:hover { background: #F5F0FF; }

    .note-input-area {
      display: none;
      margin-top: 0.75rem;
      gap: 0.6rem;
      align-items: flex-end;
    }
    .note-input-area.visible { display: flex; }

    .note-input-area textarea {
      flex: 1;
      padding: 0.5rem 0.7rem;
      border: 1.5px solid #DDD8F5;
      border-radius: 7px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: none;
      min-height: 64px;
      outline: none;
      color: #2D2A3E;
    }
    .note-input-area textarea:focus { border-color: #B8A8F0; }

    .note-btns {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .btn-save-note {
      background: #C5B3FF;
      color: #3E2080;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-save-note:hover { background: #B8A3F5; }

    .btn-cancel-note {
      background: none;
      border: 1.5px solid #DDD8F5;
      color: #A89FC8;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-cancel-note:hover { background: #F5F2FF; }

    .empty-state {
      text-align: center;
      padding: 3.5rem 1rem;
      color: #C5B8E0;
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Projekt</h1>

  <div class="toolbar">
    <div class="field field-name">
      <label>Projektnamn</label>
      <input type="text" id="inp-name" placeholder="Namn på projekt" />
    </div>
    <div class="field">
      <label>Status</label>
      <select id="inp-status">
        <option value="">Välj status</option>
        <option value="todo">Todo</option>
        <option value="progress">Pågående</option>
        <option value="review">Granskning</option>
        <option value="done">Klar</option>
      </select>
    </div>
    <div class="field">
      <label>Deadline</label>
      <input type="date" id="inp-deadline" />
    </div>
    <div class="field">
      <label style="visibility:hidden;">.</label>
      <button class="btn-add" onclick="addProject()">+ Lägg till</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th class="col-color"></th>
        <th class="col-expand"></th>
        <th>Projektnamn</th>
        <th>Status</th>
        <th>Deadline</th>
        <th class="col-actions"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty-state" class="empty-state">Inga projekt ännu. Lägg till ett ovan.</div>
</div>

<script>
  const PALETTE = [
    '#FFB3B3', '#FFD4B3', '#FFF5B3', '#C8F5D8',
    '#B8E8FF', '#C5B3FF', '#FFB3E8', '#B8F0E8',
    '#E8D5B0', '#D4E4FF',
  ];

  const STATUS = {
    '':        { bg: '#EEE9FF', color: '#9890B8', label: 'Välj status' },
    todo:      { bg: '#D4E4FF', color: '#3060C0', label: 'Todo' },
    progress:  { bg: '#FFF0C0', color: '#A87000', label: 'Pågående' },
    review:    { bg: '#EAD8FF', color: '#6A30B8', label: 'Granskning' },
    done:      { bg: '#C8F5D8', color: '#187840', label: 'Klar' },
  };

  let projects = JSON.parse(localStorage.getItem('proj_v2') || '[]');
  let nextId   = parseInt(localStorage.getItem('proj_v2_id') || '1');
  let activePopover = null;

  function save() {
    localStorage.setItem('proj_v2', JSON.stringify(projects));
    localStorage.setItem('proj_v2_id', String(nextId));
  }

  function monthFromNow() {
    const d = new Date();
    d.setMonth(d.getMonth() + 1);
    return d.toISOString().slice(0, 10);
  }

  function todayStr() { return new Date().toISOString().slice(0, 10); }

  function setDefaultDeadline() {
    document.getElementById('inp-deadline').value = monthFromNow();
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('-');
    return `${d}.${m}.${y}`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── Add project ─────────────────────────────────────────── */
  function addProject() {
    const name = document.getElementById('inp-name').value.trim();
    if (!name) { document.getElementById('inp-name').focus(); return; }
    const status   = document.getElementById('inp-status').value;
    const deadline = document.getElementById('inp-deadline').value || monthFromNow();
    const color    = PALETTE[projects.length % PALETTE.length];
    projects.push({ id: nextId++, name, status, deadline, color, notes: [] });
    save();
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-status').value = '';
    setDefaultDeadline();
    appendProjectRow(projects[projects.length - 1]);
    document.getElementById('empty-state').style.display = 'none';
  }

  /* ── Delete project ──────────────────────────────────────── */
  function deleteProject(id) {
    projects = projects.filter(p => p.id !== id);
    save();
    document.getElementById(`row-${id}`)?.remove();
    document.getElementById(`notes-${id}`)?.remove();
    if (!projects.length)
      document.getElementById('empty-state').style.display = 'block';
  }

  /* ── Status ──────────────────────────────────────────────── */
  function setStatus(id, value) {
    const p = projects.find(p => p.id === id);
    if (!p) return;
    p.status = value;
    save();
    const s  = STATUS[value] || STATUS[''];
    const el = document.querySelector(`#row-${id} .status-select`);
    if (el) { el.style.background = s.bg; el.style.color = s.color; }
  }

  /* ── Color ───────────────────────────────────────────────── */
  function showPalette(id) {
    closePopover();
    const p  = projects.find(p => p.id === id);
    const td = document.getElementById(`ctd-${id}`);

    const pop = document.createElement('div');
    pop.className = 'palette-popover';
    PALETTE.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'palette-swatch' + (c === p.color ? ' selected' : '');
      sw.style.background = c;
      if (c === p.color) sw.style.borderColor = '#555';
      sw.onclick = e => { e.stopPropagation(); applyColor(id, c); };
      pop.appendChild(sw);
    });

    td.style.position = 'relative';
    td.appendChild(pop);
    activePopover = pop;
  }

  function applyColor(id, color) {
    const p = projects.find(p => p.id === id);
    if (!p) return;
    p.color = color;
    save();
    const bar = document.querySelector(`#ctd-${id} .color-bar`);
    if (bar) bar.style.background = color;
    const notesTd = document.querySelector(`#notes-${id} td.notes-cell`);
    if (notesTd) notesTd.style.borderLeftColor = color;
    closePopover();
  }

  function closePopover() {
    if (activePopover) { activePopover.remove(); activePopover = null; }
  }

  /* ── Expand / collapse ───────────────────────────────────── */
  function toggleRow(id) {
    const notesRow = document.getElementById(`notes-${id}`);
    const btn      = document.getElementById(`expand-${id}`);
    notesRow.classList.toggle('open');
    btn.classList.toggle('open');
  }

  /* ── Notes ───────────────────────────────────────────────── */
  function showNoteInput(id) {
    document.getElementById(`add-note-btn-${id}`).style.display  = 'none';
    document.getElementById(`note-input-${id}`).classList.add('visible');
    document.getElementById(`note-ta-${id}`).focus();
  }

  function cancelNote(id) {
    document.getElementById(`note-input-${id}`).classList.remove('visible');
    document.getElementById(`add-note-btn-${id}`).style.display = 'inline-flex';
    document.getElementById(`note-ta-${id}`).value = '';
  }

  function saveNote(id) {
    const ta   = document.getElementById(`note-ta-${id}`);
    const text = ta.value.trim();
    if (!text) return;
    const p = projects.find(p => p.id === id);
    if (!p) return;
    const note = { id: Date.now(), date: todayStr(), text };
    p.notes.push(note);
    save();
    ta.value = '';
    document.getElementById(`note-input-${id}`).classList.remove('visible');
    document.getElementById(`add-note-btn-${id}`).style.display = 'inline-flex';
    appendNoteItem(id, note);
  }

  function deleteNote(projId, noteId) {
    const p = projects.find(p => p.id === projId);
    if (!p) return;
    p.notes = p.notes.filter(n => n.id !== noteId);
    save();
    document.getElementById(`note-item-${noteId}`)?.remove();
  }

  /* ── Render helpers ──────────────────────────────────────── */
  function appendNoteItem(projId, note) {
    const list = document.getElementById(`notes-list-${projId}`);
    const div  = document.createElement('div');
    div.className = 'note-item';
    div.id = `note-item-${note.id}`;
    div.innerHTML = `
      <span class="note-date">${formatDate(note.date)}</span>
      <span class="note-text">${escHtml(note.text)}</span>
      <button class="note-delete" onclick="deleteNote(${projId}, ${note.id})" title="Ta bort">✕</button>
    `;
    list.appendChild(div);
  }

  function appendProjectRow(p) {
    const tbody = document.getElementById('tbody');
    const s = STATUS[p.status] || STATUS[''];
    const isOverdue = p.deadline && p.deadline < todayStr();

    // Project row
    const tr = document.createElement('tr');
    tr.className = 'project-row';
    tr.id = `row-${p.id}`;
    tr.innerHTML = `
      <td class="col-color" id="ctd-${p.id}" onclick="event.stopPropagation(); showPalette(${p.id})" title="Välj färg">
        <div class="color-bar" style="background:${p.color};"></div>
      </td>
      <td style="padding:0.8rem 0.5rem;">
        <button class="expand-btn" id="expand-${p.id}" onclick="toggleRow(${p.id})" title="Visa anteckningar">&#9654;</button>
      </td>
      <td style="font-weight:500;">${escHtml(p.name)}</td>
      <td>
        <select class="status-select"
          style="background:${s.bg};color:${s.color};"
          onchange="setStatus(${p.id}, this.value)">
          ${Object.entries(STATUS).map(([val, st]) =>
            `<option value="${val}" ${p.status === val ? 'selected' : ''}>${st.label}</option>`
          ).join('')}
        </select>
      </td>
      <td class="deadline-cell${isOverdue ? ' overdue' : ''}">${formatDate(p.deadline)}${isOverdue ? ' ⚠' : ''}</td>
      <td>
        <button class="delete-btn" onclick="deleteProject(${p.id})" title="Ta bort">✕</button>
      </td>
    `;
    tbody.appendChild(tr);

    // Notes row
    const nr = document.createElement('tr');
    nr.className = 'notes-row';
    nr.id = `notes-${p.id}`;

    const td = document.createElement('td');
    td.colSpan = 6;
    td.className = 'notes-cell';
    td.style.borderLeftColor = p.color;
    td.innerHTML = `
      <div id="notes-list-${p.id}"></div>
      <button class="add-note-btn" id="add-note-btn-${p.id}" onclick="showNoteInput(${p.id})">+ Lägg till anteckning</button>
      <div class="note-input-area" id="note-input-${p.id}">
        <textarea id="note-ta-${p.id}" placeholder="Skriv en anteckning…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveNote(${p.id});}"></textarea>
        <div class="note-btns">
          <button class="btn-save-note" onclick="saveNote(${p.id})">Spara</button>
          <button class="btn-cancel-note" onclick="cancelNote(${p.id})">Avbryt</button>
        </div>
      </div>
    `;
    nr.appendChild(td);
    tbody.appendChild(nr);

    p.notes.forEach(n => appendNoteItem(p.id, n));
  }

  function render() {
    document.getElementById('tbody').innerHTML = '';
    document.getElementById('empty-state').style.display =
      projects.length ? 'none' : 'block';
    projects.forEach(appendProjectRow);
  }

  /* ── Init ────────────────────────────────────────────────── */
  document.addEventListener('click', closePopover);

  document.getElementById('inp-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addProject();
  });

  setDefaultDeadline();
  render();
</script>
</body>
</html>
